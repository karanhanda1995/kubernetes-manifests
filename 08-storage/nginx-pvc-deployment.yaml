apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-pvc
spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-pvc

  template:
    metadata:
      labels:
        app: nginx-pvc

    spec:
      containers:
        - name: nginx
          image: nginx

          volumeMounts:
            - mountPath: /usr/share/nginx/html
              name: app-storage

      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: demo-pvc
