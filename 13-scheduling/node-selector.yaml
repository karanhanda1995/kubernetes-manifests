apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-node-selector

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx-node

  template:
    metadata:
      labels:
        app: nginx-node

    spec:
      nodeSelector:
        disktype: ssd

      containers:
      - name: nginx
        image: nginx
