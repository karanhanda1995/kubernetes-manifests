apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-affinity

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx-affinity

  template:
    metadata:
      labels:
        app: nginx-affinity

    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: disktype
                operator: In
                values:
                - ssd

      containers:
      - name: nginx
        image: nginx
