apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-scale
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx-scale
  template:
    metadata:
      labels:
        app: nginx-scale
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
