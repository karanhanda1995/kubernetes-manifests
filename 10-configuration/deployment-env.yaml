apiVersion: apps/v1
kind: Deployment

metadata:
  name: env-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: env-demo

  template:
    metadata:
      labels:
        app: env-demo

    spec:
      containers:
        - name: nginx
          image: nginx

          envFrom:
            - configMapRef:
                name: application-config

            - secretRef:
                name: application-secret
